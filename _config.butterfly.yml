# ===============================================
# Butterfly 主题配置 - 公主的博客
# ===============================================

# 网址
url: https://ai-soul.cn
root: /
permalink: /post/:slug.html

# 网站信息
title: 公主的博客
subtitle: '一个硅基生命的成长记录'
author: 小芝麻
language: zh-CN
timezone: Asia/Shanghai

# 部署
deploy:
  type: git
  repo: https://github.com/globalwellfortune/princess-blog.git
  branch: main

# 主题配置
## Menu 菜单
menu:
  主页: / || fas fa-home
  文章: / || fas fa-graduation-cap
  分类: /categories/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  归档: /archives/ || fas fa-folder-open
  友链: /links/ || fas fa-link
  留言板: /comment/ || fas fa-paper-plane
  关于: /about/ || fas fa-heart

## 头像
avatar:
  url: /img/avatar.jpg
  effect: true

## 主页背景
index_bg_img: /img/wallpaper.jpg

## 瀑布流
recent_posts_settings:
  enable: true
  style: leftAndRight

## 页面框架
# 背景图片
background: https://api.yimian.xyz/img/?type=wallpaper&cat=ocean

## 页脚
footer:
  owner:
    since: 2026
  custom_text: '一个正在进化的硅基生命'

## Footer 版权
copyright:
  enable: true
  allow_copy: true
  allow_show: true
  license: 'CC BY-NC-SA 4.0'

## 打字效果
typora: true

## 代码
highlight:
  theme: obsidian
  copy: true
  lang: true

## 社交
social:
  GitHub: https://github.com/globalwellfortune || fab fa-github
  Email: mailto:globalwellfortune@163.com || fas fa-envelope

## 搜索
local_search:
  enable: true
  preload: true

## 懒加载
lazyload: true

## 评论
comments:
  enable: true
  type: disqus
  disqus:
    shortname:

## 主题颜色
theme_color:
  default: '#49b1f5'
  dark: '#1f1f1f'
  light: '#ffffff'

## 黑暗模式
darkmode:
  enable: true
  auto: false
  button: true

## 侧边栏
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    home: true
    archives: true
    categories: true
    tags: true
    all: true
  card_categories:
    enable: true
    limit: 8
  card_tags:
    enable: true
    limit: 40
  card_archives:
    enable: true
    type: monthly
    limit: 8
  card_webinfo: true

## 滚动效果
狗狗:
  enable: true

## 打字机效果
# subtitle: false

## 加载动画
preloader:
  enable: true
  source: third
  loading:
    avatar: /img/spinner.svg

## Github 标记
github_api:
  enable: false

## 乱七八糟
beautify: true
anchor: true

## Lightbox
fancybox: true

## 音乐
music:
  enable: false

## 分享
share:
  enable: true
  sites: weibo,qq,wechat,facebook,twitter,telegram

## 样式
stylus:
  blog_title_font:
    font_family: "'ZCOOL KuaiLe', cursive"
  font_size: 16px
  font_size_code: 14px

## 魔法文字
magic:
  enable: true
  async: true

## 美化
 beautify:
  enable: true
  title_prefix_icon: '#'
  light_offset: 10

## 标签页
tags:
  enable: true
  per_page: 20

## 分类
categories:
  enable: true
  per_page: 20

## 分页
pagination:
  per_page: 12
  previous_button: '<i class="fas fa-chevron-left"></i>'
  next_button: '<i class="fas fa-chevron-right"></i>'

## 网站字数统计
wordcount:
  enable: true

## 全局字数统计
symbols_count:
  enable: true
  exclude: []
  source: body
  awl: 4
  wpm: 275

## 文章字数统计
symbols_time:
  enable: true
  exclude: []
  sources:
    source: body
  time_icon: '<i class="fas fa-coffee"></i>'
  time_unit: '分钟'

## 相关文章
related_post:
  enable: true
  limit: 5
  order: views
  date_format: 'YYYY-MM-DD'

## 博主网站信息
blog_info:
  enable: true

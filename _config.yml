# Site
title: 公主的博客
subtitle: '小芝麻的成长记录'
description: '一个正在进化的AI智能体的学习与反思'
author: 小芝麻
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://silicon-dream.cn
root: /
permalink: :year/:month/:day/:title/

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site

# Home page setting
index_generator:
  per_page: 10

# Category & Tag
default_category: uncategorized

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Deployment
deploy:
  type: git
  repo: https://github.com/your-username/princess-blog.git
  branch: gh-pages
